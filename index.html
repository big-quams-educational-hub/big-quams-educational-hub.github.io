<style>
:root {
  --blue:    #1a3fa8;
  --blue-dk: #102880;
  --orange:  #f97316;
  --green:   #16a34a;
  --muted:   #64748b;
  --light:   #f0f5ff;
  --card:    #ffffff;
  --text:    #0f172a;
  --border:  #e2e8f0;
  --bg:      #f8faff;
  --sec-bg:  #ffffff;
}

/* DARK MODE */
body.dark {
  --muted:  #94a3b8;
  --light:  #1e2a4a;
  --card:   #1a2540;
  --text:   #e2e8f0;
  --border: #2d3f6b;
  --bg:     #0f172a;
  --sec-bg: #141f38;
}
body.dark { background: var(--bg); color: var(--text); }
body.dark header { background: linear-gradient(135deg, #080f20, #102880); }
body.dark .hero  { background: linear-gradient(145deg, #1a2540 0%, #0f1a35 60%, #1c2035 100%); }
body.dark .hero h1 { color: #e2e8f0; }
body.dark .hero p  { color: #94a3b8; }
body.dark .hero-badge { background: rgba(255,255,255,0.07); color: #93c5fd; border-color: rgba(255,255,255,0.1); }
body.dark #about  { background: var(--sec-bg); }
body.dark #services { background: var(--bg); }
body.dark #news-updates { background: var(--sec-bg); }
body.dark #contact { background: var(--bg); }
body.dark .service-card,
body.dark .news-card,
body.dark .contact-form,
body.dark .contact-link-card { background: var(--card); border-color: var(--border); color: var(--text); }
body.dark .service-card h3,
body.dark .news-card h3,
body.dark h2.section-title { color: #bfdbfe; }
body.dark .news-card p,
body.dark .about-text p,
body.dark .service-card p { color: var(--muted); }
body.dark .stat-card { background: #1a2540; }
body.dark .form-group input,
body.dark .form-group textarea { background: #1a2540; border-color: var(--border); color: var(--text); }
body.dark .testimonial { background: #1a2540; color: #94a3b8; }
body.dark .contact-link-card { color: var(--text); }
body.dark .contact-link-card .lbl { color: var(--muted); }
body.dark .modal-box { background: #1a2540; }
body.dark .modal-body ul li { color: #cbd5e1; }
body.dark .modal-body h4 { color: var(--orange); }
body.dark .modal-close { background: rgba(255,255,255,0.1); }

/* DARK TOGGLE BUTTON */
.dark-toggle {
  background: rgba(255,255,255,0.12);
  border: none; color: white;
  width: 36px; height: 36px;
  border-radius: 50%; font-size: 1rem;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: background 0.2s;
  flex-shrink: 0;
}
.dark-toggle:hover { background: rgba(255,255,255,0.22); }


/* GLOBAL IMAGE OVERFLOW FIX */
img { max-width: 100%; height: auto; display: block; }
.news-card, .dyk-card, .dyk-preview-card, .spotlight-card, .book-card, .review-card { overflow: hidden; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Roboto', sans-serif;
  background: #f8faff;
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* HEADER */
header {
  background: linear-gradient(135deg, var(--blue-dk) 0%, var(--blue) 100%);
  color: white;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(26,63,168,0.25);
}
.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.logo-wrap { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.logo-circle {
  width: 44px; height: 44px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid var(--orange);
  flex-shrink: 0;
}
.logo-circle img { width: 100%; height: 100%; object-fit: cover; }
.brand-text { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1rem; letter-spacing: 0.5px; line-height: 1.2; }
.brand-sub  { font-size: 0.65rem; color: #bfdbfe; }

/* Hamburger */
.menu-toggle {
  display: none;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  cursor: pointer;
  margin-left: auto;
  padding: 6px;
}
.menu-toggle span {
  display: block; width: 24px; height: 2px;
  background: white; border-radius: 2px;
  transition: 0.3s;
}

nav {
  display: flex; flex-wrap: wrap;
  gap: 6px 18px; margin-left: auto;
  align-items: center;
}
nav a { color: #dbeafe; text-decoration: none; font-size: 0.88rem; font-weight: 500; transition: color 0.2s; }
nav a:hover { color: var(--orange); }
.nav-cta {
  background: var(--orange) !important;
  color: white !important;
  padding: 7px 16px;
  border-radius: 6px;
  font-weight: 700 !important;
  font-size: 0.85rem !important;
}
.nav-cta:hover { background: #ea6c0a !important; }

@media (max-width: 600px) {
  .menu-toggle { display: flex; }
  nav {
    display: none;
    width: 100%;
    flex-direction: column;
    align-items: flex-start;
    gap: 0;
    background: var(--blue-dk);
    margin-left: 0;
    padding: 8px 0 12px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  nav.open { display: flex; }
  nav a { padding: 10px 16px; width: 100%; font-size: 0.95rem; }
  nav a:hover { background: rgba(255,255,255,0.08); color: var(--orange); }
  .nav-cta { margin: 8px 16px 0; width: calc(100% - 32px); text-align: center; border-radius: 6px; }
}

/* HERO */
.hero {
  background: linear-gradient(145deg, #dbeafe 0%, #eff6ff 60%, #fef3c7 100%);
  padding: 48px 16px 44px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
@media (min-width: 600px) { .hero { padding: 72px 24px 64px; } }
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(249,115,22,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.hero-badge {
  display: inline-block;
  background: rgba(26,63,168,0.1);
  color: var(--blue);
  border: 1px solid rgba(26,63,168,0.2);
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 0.76rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 18px;
  animation: fadeUp 0.5s ease both;
}
.hero h1 {
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 800;
  color: var(--blue-dk);
  line-height: 1.15;
  margin-bottom: 16px;
  animation: fadeUp 0.6s 0.1s ease both;
}
.hero h1 span { color: var(--orange); }
.hero p {
  color: var(--muted);
  font-size: 1.05rem;
  max-width: 600px;
  margin: 0 auto 28px;
  animation: fadeUp 0.6s 0.2s ease both;
}
.hero-btns {
  display: flex; gap: 10px;
  justify-content: center; flex-wrap: wrap;
  animation: fadeUp 0.6s 0.3s ease both;
}
@media (max-width: 520px) {
  .hero-btns { flex-direction: column; align-items: stretch; padding: 0 4px; gap: 8px; }
  .hero-btns .btn,
  .hero-btns .btn-outline,
  .hero-btns .calc-trigger-btn,
  .hero-btns .share-page-btn { text-align: center; width: 100%; justify-content: center; }
}

/* BUTTONS */
.btn {
  background: var(--orange);
  color: white;
  padding: 11px 22px;
  border-radius: 8px;
  font-weight: 700;
  text-decoration: none;
  display: inline-block;
  transition: background 0.2s, transform 0.15s;
  border: none;
  cursor: pointer;
  font-family: 'Roboto', sans-serif;
  font-size: 0.95rem;
}
.btn:hover { background: #ea6c0a; transform: translateY(-1px); }
.btn-wa { background: #25d366; }
.btn-wa:hover { background: #20bd5a; }
.btn-outline {
  background: transparent;
  color: var(--blue);
  border: 2px solid var(--blue);
  padding: 9px 20px;
  border-radius: 8px;
  font-weight: 700;
  text-decoration: none;
  display: inline-block;
  transition: 0.2s;
  font-family: 'Roboto', sans-serif;
  font-size: 0.95rem;
}
.btn-outline:hover { background: var(--blue); color: white; }

/* CONTAINER */
.container { max-width: 1100px; margin: 0 auto; padding: 40px 16px; }
@media (min-width: 600px) { .container { padding: 60px 24px; } }

/* SECTION HEADING */
.section-label {
  display: inline-block;
  background: rgba(249,115,22,0.1);
  color: var(--orange);
  padding: 3px 12px;
  border-radius: 20px;
  font-size: 0.74rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}
h2.section-title {
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(1.5rem, 4vw, 2rem);
  font-weight: 800;
  color: var(--blue-dk);
  margin-bottom: 8px;
}
.section-divider {
  width: 48px; height: 4px;
  background: var(--orange);
  border-radius: 2px;
  margin-bottom: 28px;
}

/* ABOUT */
#about { background: white; }
.about-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 40px;
  align-items: center;
}
@media (min-width: 700px) { .about-grid { grid-template-columns: 1fr 1fr; } }
.about-text p { color: #475569; margin-bottom: 14px; font-size: 0.97rem; }
.about-text em { color: var(--blue); font-style: normal; font-weight: 600; }
.about-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 340px) { .about-stats { grid-template-columns: 1fr; } }
.stat-card {
  background: var(--light);
  border-radius: 12px;
  padding: 20px 16px;
  text-align: center;
  border-left: 4px solid var(--orange);
}
.stat-num { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--blue); }
.stat-lbl { font-size: 0.78rem; color: var(--muted); font-weight: 500; }

/* SERVICES */
#services { background: var(--light); }
.services-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}
@media (min-width: 480px) { .services-grid { grid-template-columns: 1fr 1fr; } }
@media (min-width: 860px) { .services-grid { grid-template-columns: 1fr 1fr 1fr; } }
@media (max-width: 340px) { .services-grid { grid-template-columns: 1fr; } }
.service-card {
  background: white;
  border-radius: 14px;
  padding: 28px 22px;
  border: 1px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
  overflow: hidden;
}
.service-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--orange), var(--blue));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
}
.service-card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
.service-card:hover::after { transform: scaleX(1); }
.service-icon { font-size: 2rem; margin-bottom: 14px; }
.service-card h3 { font-family: 'Montserrat', sans-serif; font-size: 1rem; font-weight: 700; color: var(--blue-dk); margin-bottom: 8px; }
.service-card p { font-size: 0.875rem; color: var(--muted); line-height: 1.5; }

/* NEWS */
#news-updates { background: white; }
.news-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}
@media (min-width: 640px) { .news-grid { grid-template-columns: 1fr 1fr; } }
@media (min-width: 960px) { .news-grid { grid-template-columns: 1fr 1fr 1fr; } }

.news-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  transition: transform 0.25s, box-shadow 0.25s;
  animation: fadeUp 0.5s ease both;
  overflow: hidden;
}
.news-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.09); }
.news-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.category-label {
  background: #dbeafe; color: var(--blue);
  padding: 2px 10px; border-radius: 20px;
  font-size: 0.68rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.date-label { color: var(--muted); font-size: 0.72rem; }
.news-card h3 {
  font-family: 'Montserrat', sans-serif;
  font-size: 0.97rem; font-weight: 700;
  color: var(--blue-dk); line-height: 1.35;
  margin-bottom: 10px;
}
.news-card p { font-size: 0.875rem; color: #475569; flex-grow: 1; margin-bottom: 16px; line-height: 1.55; }
.news-actions { display: flex; gap: 8px; }
.news-actions a, .news-actions button {
  flex: 1; text-align: center;
  padding: 9px 10px; border-radius: 7px;
  font-weight: 700; font-size: 0.82rem;
  cursor: pointer; text-decoration: none;
  border: none; transition: 0.2s;
  font-family: 'Roboto', sans-serif;
}
.news-actions a { background: var(--orange); color: white; }
.news-actions a:hover { background: #ea6c0a; }
.news-actions button { background: var(--light); color: var(--blue); }
.news-actions button:hover { background: #dbeafe; }
.news-loading {
  grid-column: 1 / -1; text-align: center;
  padding: 48px; color: var(--muted); font-size: 0.95rem;
}

/* CONTACT */
#contact { background: var(--light); }
.contact-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 40px;
}
@media (min-width: 700px) { .contact-grid { grid-template-columns: 1fr 1fr; } }
.contact-form {
  background: white; border-radius: 16px;
  padding: 20px 16px; border: 1px solid var(--border);
  box-shadow: 0 4px 16px rgba(0,0,0,0.05);
}
@media (min-width: 600px) { .contact-form { padding: 32px; } }
.testimonial { background: #f1f5f9; padding: 20px 24px; margin: 16px 0; border-left: 5px solid var(--orange); border-radius: 8px; font-style: italic; color: #475569; max-width: 800px; }
.testimonial strong { display: block; margin-bottom: 6px; color: var(--blue-dk); font-style: normal; }

/* REVIEWS SECTION */
#reviews { background: var(--light); }
body.dark #reviews { background: var(--bg); }
.reviews-grid {
  display: grid; grid-template-columns: 1fr; gap: 16px;
}
@media (min-width: 560px) { .reviews-grid { grid-template-columns: 1fr 1fr; } }
@media (min-width: 900px) { .reviews-grid { grid-template-columns: 1fr 1fr 1fr; } }
@media (max-width: 360px) { .review-card { padding: 16px 14px; } }
.review-card {
  background: white; border-radius: 14px; padding: 22px;
  border: 1px solid var(--border); display: flex;
  flex-direction: column; gap: 10px;
  transition: transform 0.25s, box-shadow 0.25s;
}
body.dark .review-card { background: var(--card); border-color: var(--border); }
.review-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
.review-stars { color: #f59e0b; font-size: 1rem; letter-spacing: 2px; }
.review-msg { font-size: 0.9rem; color: #475569; line-height: 1.6; font-style: italic; flex: 1; }
body.dark .review-msg { color: var(--muted); }
.review-msg::before { content: '"'; } .review-msg::after { content: '"'; }
.review-footer { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
.review-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), var(--orange));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Montserrat', sans-serif; font-weight: 800;
  font-size: 0.9rem; color: white; flex-shrink: 0;
}
.review-name { font-family: 'Montserrat', sans-serif; font-size: 0.88rem; font-weight: 700; color: var(--blue-dk); line-height: 1.2; }
body.dark .review-name { color: #bfdbfe; }
.review-location { font-size: 0.74rem; color: var(--muted); }

/* CALCULATOR SECTION */
#calculator-section { background: white; }
body.dark #calculator-section { background: var(--sec-bg); }
.calc-open-card {
  background: linear-gradient(135deg, var(--blue-dk), var(--blue));
  border-radius: 16px; padding: 32px 24px;
  text-align: center; color: white;
  max-width: 580px; margin: 0 auto;
  position: relative; overflow: hidden;
}
.calc-open-card::before {
  content: '🧮'; position: absolute; font-size: 9rem;
  opacity: 0.05; right: -10px; top: -10px; pointer-events: none;
}
.calc-open-card h3 { font-family: 'Montserrat', sans-serif; font-size: 1.3rem; font-weight: 800; margin-bottom: 8px; }
.calc-open-card p  { font-size: 0.88rem; color: #bfdbfe; margin-bottom: 18px; line-height: 1.5; }
.calc-feature-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 22px; }
@media (max-width: 400px) { .calc-feature-pill { font-size: 0.68rem; padding: 4px 9px; } }
.calc-feature-pill {
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
  padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
}
.calc-open-btn {
  background: var(--orange); color: white;
  border: none; padding: 13px 28px; border-radius: 10px;
  font-family: 'Montserrat', sans-serif; font-weight: 800;
  font-size: 0.95rem; cursor: pointer; transition: 0.2s;
  display: inline-flex; align-items: center; gap: 8px;
}
.calc-open-btn:hover { background: #ea6c0a; transform: translateY(-1px); }

.contact-form h3 { font-family: 'Montserrat', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--blue-dk); margin-bottom: 20px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: #374151; margin-bottom: 5px; }
.form-group input, .form-group textarea {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 0.95rem;
  font-family: 'Roboto', sans-serif;
  color: var(--text); transition: border-color 0.2s;
  background: #fafafa;
}
.form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--blue); background: white; }
.form-group textarea { resize: vertical; min-height: 110px; }
.submit-btn {
  width: 100%; background: var(--blue); color: white;
  padding: 13px; border: none; border-radius: 8px;
  font-weight: 700; font-size: 1rem;
  font-family: 'Montserrat', sans-serif;
  cursor: pointer; transition: 0.2s; margin-top: 4px;
}
.submit-btn:hover { background: var(--blue-dk); }
.contact-links { display: flex; flex-direction: column; gap: 14px; }
.contact-link-card {
  display: flex; align-items: center; gap: 12px;
  background: white; border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
  text-decoration: none; color: var(--text);
  transition: box-shadow 0.2s, transform 0.2s;
  font-weight: 600; word-break: break-word;
}
.contact-link-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1);x rgba(0,0,0,0.1
