<style>

.tool-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:.68rem;font-weight:700;padding:5px 14px;border-radius:30px;margin-bottom:14px}

.tool-hero h1{font-family:'Montserrat',sans-serif;font-size:1.5rem;font-weight:800;color:#fff;margin-bottom:8px}

.tool-hero p{font-size:.85rem;color:rgba(255,255,255,.72);max-width:520px;margin:0 auto}

.tool-body{padding:28px 0 60px}

.gpa-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:20px;margin-bottom:18px;box-shadow:var(--shadow-md)}

.scale-toggle{display:flex;gap:8px;margin-bottom:18px}

.scale-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);font-weight:800;font-size:.82rem;cursor:pointer;font-family:'Montserrat',sans-serif}

.scale-btn.active{background:var(--blue-main);border-color:var(--blue-main);color:#fff}

.sem-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}

.sem-head h2{font-family:'Montserrat',sans-serif;font-size:1rem;font-weight:800}

.sem-remove{background:#fee2e2;color:#b91c1c;border:none;width:30px;height:30px;border-radius:8px;font-size:.85rem;cursor:pointer}

.course-row{display:grid;grid-template-columns:1fr 70px 90px 34px;gap:8px;margin-bottom:8px;align-items:center}

@media(max-width:480px){.course-row{grid-template-columns:1fr 60px 70px 30px}}

.course-row input,.course-row select{padding:9px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface-alt);color:var(--text-main);font-size:.82rem;width:100%}

.course-remove{background:none;border:none;color:var(--text-faint);font-size:1rem;cursor:pointer;width:30px;text-align:center}

.add-course-btn{background:var(--surface-alt);border:1.5px dashed var(--border);color:var(--blue-main);font-weight:700;font-size:.8rem;padding:10px;border-radius:9px;width:100%;cursor:pointer;margin-top:6px}

.add-sem-btn{background:transparent;border:1.5px dashed var(--blue-main);color:var(--blue-main);font-weight:800;font-size:.85rem;padding:12px;border-radius:12px;width:100%;cursor:pointer;margin-bottom:18px;font-family:'Montserrat',sans-serif}

.gpa-result-label{font-size:.7rem;color:rgba(255,255,255,.65);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}

.gpa-result-value{font-family:'Montserrat',sans-serif;font-size:2.6rem;font-weight:800;line-height:1}

.gpa-result-class{font-size:.85rem;color:#fdba74;font-weight:700;margin-top:6px}

.sem-gpa-chip{display:inline-block;background:var(--surface-alt);border-radius:8px;padding:4px 10px;font-size:.72rem;font-weight:700;color:var(--blue-main);margin-top:4px}

.grade-key{font-size:.72rem;color:var(--text-muted);text-align:center;margin-top:14px;line-height:1.6}

.reset-link{display:block;text-align:center;margin-top:14px;font-size:.78rem;color:var(--text-muted);cursor:pointer}

<body>
<script>(function(){var s=localStorage.getItem('bqm-theme');if(s==='dark'||(!s&&window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.body.classList.add('dark');}})();</script>

<header id="bqm-header"></header>
<nav id="bqm-mobile-nav"></nav>

<main id="main-content">
  <div class="tool-hero">
    <div class="tool-badge">🎓 Free Tool</div>
    <h1>GPA &amp; CGPA Calculator</h1>
    <p>Add your courses per semester, pick your school's grading scale, and get your GPA and running CGPA instantly.</p>
  </div>

  <div class="tool-body">
    <div class="wrap">
      <div class="gpa-card">
        <div class="scale-toggle">
          <button type="button" class="scale-btn active" id="scale5" onclick="setScale(5)">5.0 Scale</button>
          <button type="button" class="scale-btn" id="scale4" onclick="setScale(4)">4.0 Scale</button>
        </div>
        <div class="grade-key" id="gradeKey"></div>
      </div>

      <div id="semesters"></div>

      <button type="button" class="add-sem-btn" onclick="addSemester()">➕ Add Another Semester</button>

      <div class="gpa-result">
        <div class="gpa-result-label">Cumulative GPA (CGPA)</div>
        <div class="gpa-result-value" id="cgpaValue">0.00</div>
        <div class="gpa-result-class" id="cgpaClass">Add courses to get started</div>
      </div>

      <a class="reset-link" onclick="resetAll()">↺ Reset everything</a>
    </div>
  </div>
</main>

<footer id="bqm-footer"></footer>

<script src="assets/shared.js" defer></script>
<script>
// ── GPA / CGPA CALCULATOR ──
let scale = 5;
let semesters = [];
let courseIdSeq = 0;

const GRADE_POINTS = {
  5: { 'A':5, 'B':4, 'C':3, 'D':2, 'E':1, 'F':0 },
  4: { 'A':4, 'B':3, 'C':2, 'D':1, 'F':0 }
};
const GRADE_KEYS = {
  5: 'A = 5 · B = 4 · C = 3 · D = 2 · E = 1 · F = 0',
  4: 'A = 4 · B = 3 · C = 2 · D = 1 · F = 0'
};
const CLASS_BANDS_5 = [
  [4.50, 5.00, 'First Class'],
  [3.50, 4.49, 'Second Class Upper'],
  [2.40, 3.49, 'Second Class Lower'],
  [1.50, 2.39, 'Third Class'],
  [1.00, 1.49, 'Pass'],
  [0, 0.99, 'Below Pass Mark']
];
const CLASS_BANDS_4 = [
  [3.60, 4.00, 'First Class'],
  [3.00, 3.59, 'Second Class Upper'],
  [2.00, 2.99, 'Second Class Lower'],
  [1.00, 1.99, 'Third Class'],
  [0, 0.99, 'Below Pass Mark']
];

function setScale(s){
  scale = s;
  document.getElementById('scale5').classList.toggle('active', s === 5);
  document.getElementById('scale4').classList.toggle('active', s === 4);
  document.getElementById('gradeKey').textContent = GRADE_KEYS[s];
  // Clamp any grades that don't exist on the new scale (e.g. 'E' on 4.0 scale)
  semesters.forEach(sem => sem.courses.forEach(c => {
    if (!(c.grade in GRADE_POINTS[scale])) c.grade = 'A';
  }));
  renderAll();
}

function addSemester(){
  semesters.push({ id: 'sem' + Date.now(), name: 'Semester ' + (semesters.length + 1), courses: [] });
  addCourse(semesters[semesters.length - 1].id);
  renderAll();
}

function addCourse(semId){
  const sem = semesters.find(s => s.id === semId);
  if (!sem) return;
  sem.courses.push({ id: 'c' + (courseIdSeq++), name: '', unit: 3, grade: 'A' });
  renderAll();
}

function removeCourse(semId, courseId){
  const sem = semesters.find(s => s.id === semId);
  if (!sem) return;
  sem.courses = sem.courses.filter(c => c.id !== courseId);
  renderAll();
}

function removeSemester(semId){
  semesters = semesters.filter(s => s.id !== semId);
  renderAll();
}

function updateCourse(semId, courseId, field, value){
  const sem = semesters.find(s => s.id === semId);
  if (!sem) return;
  const course = sem.courses.find(c => c.id === courseId);
  if (!course) return;
  course[field] = field === 'unit' ? (parseFloat(value) || 0) : value;
  renderAll();
}

function computeSemGPA(sem){
  let totalPoints = 0, totalUnits = 0;
  sem.courses.forEach(c => {
    const gp = GRADE_POINTS[scale][c.grade] ?? 0;
    totalPoints += gp * c.unit;
    totalUnits += c.unit;
  });
  return totalUnits > 0 ? totalPoints / totalUnits : 0;
}

function computeCGPA(){
  let totalPoints = 0, totalUnits = 0;
  semesters.forEach(sem => sem.courses.forEach(c => {
    const gp = GRADE_POINTS[scale][c.grade] ?? 0;
    totalPoints += gp * c.unit;
    totalUnits += c.unit;
  }));
  return totalUnits > 0 ? totalPoints / totalUnits : 0;
}

function classOfDegree(gpa){
  const bands = scale === 5 ? CLASS_BANDS_5 : CLASS_BANDS_4;
  for (const [min, max, label] of bands){
    if (gpa >= min && gpa <= max) return label;
  }
  return '—';
}

function renderAll(){
  const container = document.getElementById('semesters');
  const grades = Object.keys(GRADE_POINTS[scale]);
  container.innerHTML = semesters.map(sem => {
    const semGPA = computeSemGPA(sem).toFixed(2);
    const rows = sem.courses.map(c => `
      <div class="course-row">
        <input type="text" placeholder="Course (optional)" value="${c.name.replace(/"/g,'&quot;')}"
          oninput="updateCourse('${sem.id}','${c.id}','name',this.value)">
        <input type="number" min="0" max="6" placeholder="Units" value="${c.unit}"
          oninput="updateCourse('${sem.id}','${c.id}','unit',this.value)">
        <select onchange="updateCourse('${sem.id}','${c.id}','grade',this.value)">
          ${grades.map(g => `<option value="${g}" ${g === c.grade ? 'selected' : ''}>${g}</option>`).join('')}
        </select>
        <button type="button" class="course-remove" onclick="removeCourse('${sem.id}','${c.id}')" aria-label="Remove course">✕</button>
      </div>
    `).join('');
    return `
      <div class="gpa-card">
        <div class="sem-head">
          <h2>${sem.name} <span class="sem-gpa-chip">GPA: ${semGPA}</span></h2>
          <button type="button" class="sem-remove" onclick="removeSemester('${sem.id}')" aria-label="Remove semester">🗑</button>
        </div>
        ${rows}
        <button type="button" class="add-course-btn" onclick="addCourse('${sem.id}')">➕ Add Course</button>
      </div>
    `;
  }).join('');

  const cgpa = computeCGPA();
  document.getElementById('cgpaValue').textContent = semesters.length ? cgpa.toFixed(2) : '0.00';
  document.getElementById('cgpaClass').textContent = semesters.length
    ? classOfDegree(cgpa) + ' (on the ' + scale + '.0 scale)'
    : 'Add courses to get started';
}

function resetAll(){
  if (!confirm('Clear all semesters and courses?')) return;
  semesters = [];
  renderAll();
  addSemester();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('gradeKey').textContent = GRADE_KEYS[scale];
  addSemester();
});
</script>
</body>
